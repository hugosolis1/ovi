workflows:
  ios-build:
    name: Build iOS Unsigned IPA
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        XCODE_PROJECT: "PlanetaryPositions.xcodeproj"
        XCODE_SCHEME: "PlanetaryPositions"
        BUNDLE_ID: "com.yourcompany.PlanetaryPositions"
      xcode: 15.2
    scripts:
      - name: Build unsigned IPA
        script: |
          # Build for generic iOS device
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build
          
          # Find the built app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "PlanetaryPositions.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          # Create Payload directory and copy app
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # Create IPA
          zip -r PlanetaryPositions_unsigned.ipa Payload
          
          # Move to artifacts directory
          mkdir -p build
          mv PlanetaryPositions_unsigned.ipa build/
          
          echo "IPA created successfully!"
    artifacts:
      - build/*.ipa
